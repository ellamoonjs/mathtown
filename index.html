<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정수와 유리수 계산 게임</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            background-color: #e9ecef;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            user-select: none;
            touch-action: manipulation;
        }
        #game-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #ui-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #2d3436;
            color: white;
            font-size: 20px;
            font-weight: bold;
            z-index: 2;
        }
        #hearts { color: #ff7675; letter-spacing: 2px; }
        #level-display { color: #74b9ff; }
        #play-area {
            flex-grow: 1;
            position: relative;
            background: #fdfbfb;
            overflow: hidden;
        }
        .problem {
            position: absolute;
            font-size: 24px; 
            background: white;
            border: 2px solid #0984e3;
            padding: 8px 15px;
            border-radius: 8px;
            color: #2d3436;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .shake-screen {
            animation: shake 0.3s ease-in-out;
            background-color: #ffeaa7 !important;
        }
        
        #input-display {
            height: 80px; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            background: #f1f2f6;
            font-size: 32px;
            color: #0984e3; 
            border-top: 2px solid #dfe6e9;
            z-index: 2;
            transition: background-color 0.2s;
            overflow-x: auto;
        }
        .placeholder { color: #b2bec3; font-size: 20px; font-weight: normal; font-family: 'Malgun Gothic', sans-serif; }
        
        #keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            background: #dfe6e9;
            z-index: 2;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        #keypad button {
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: white;
            color: #2d3436;
            box-shadow: 0 3px 0 #b2bec3;
            cursor: pointer;
            transition: background 0.1s;
        }
        #keypad button:active {
            transform: translateY(3px);
            box-shadow: none;
            background: #f1f2f6;
        }
        .btn-action { background: #ffeaa7 !important; }
        .btn-submit { background: #0984e3 !important; color: white !important; box-shadow: 0 3px 0 #0652dd !important; }
        
        #game-over, #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #start-screen { background: white; z-index: 20; }
        #game-over { background: rgba(45, 52, 54, 0.95); color: white; display: none; }
        #start-screen h1 { margin-bottom: 10px; color: #2d3436; font-size: 32px; }
        #start-screen p { color: #636e72; margin-bottom: 30px; text-align: center; line-height: 1.6; padding: 0 20px; }
        #game-over h1 { font-size: 45px; margin-bottom: 10px; color: #ff7675; }
        #game-over h2 { font-size: 30px; margin-bottom: 20px; color: #74b9ff; }
        
        /* 💡 추가된 초기화 버튼 스타일 */
        #reset-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 6px 12px;
            font-size: 14px;
            background: #dfe6e9;
            color: #636e72;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
        }
        #reset-btn:hover {
            background: #ff7675;
            color: white;
        }

        #high-score-text {
            font-size: 24px;
            color: #fdcb6e;
            margin-top: -10px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .new-record {
            animation: bounce 0.4s ease infinite alternate;
            color: #ffea00 !important;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stats-box p {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: #f1f2f6;
        }
        .stats-box hr {
            border: none;
            border-top: 1px dashed rgba(255,255,255,0.3);
            margin: 10px 0;
        }
        #history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            color: #ffeaa7;
            font-size: 18px;
            line-height: 1.5;
        }

        button.start-btn {
            padding: 15px 40px; font-size: 24px; font-weight: bold; background: #00b894;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #008f73;
        }
        button.start-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <!-- 💡 왼쪽 상단 기록 초기화 버튼 추가 -->
        <button id="reset-btn" onclick="resetRecords()">기록 초기화</button>
        
        <h1>정수와 유리수 계산</h1>
        <p>내려오는 수식의 정답을 키패드로 입력하세요.<br>분수는 <strong>1/2</strong> 버튼 순서로 누르면<br>자동으로 위아래 수식으로 변환됩니다!</p>
        <button class="start-btn" onclick="startGame()">게임 시작</button>
    </div>

    <div id="ui-bar">
        <div id="hearts">❤️❤️❤️❤️❤️</div>
        <div id="level-display">Lv.1</div>
        <div id="score">0 점</div>
    </div>
    
    <div id="play-area"></div>
    
    <div id="input-display"><span class="placeholder">정답 입력...</span></div>
    
    <div id="keypad">
        <button onclick="typeKey('1')">1</button>
        <button onclick="typeKey('2')">2</button>
        <button onclick="typeKey('3')">3</button>
        <button class="btn-action" onclick="typeKey('-')">-</button>
        
        <button onclick="typeKey('4')">4</button>
        <button onclick="typeKey('5')">5</button>
        <button onclick="typeKey('6')">6</button>
        <button class="btn-action" onclick="typeKey('/')">분수(/)</button>
        
        <button onclick="typeKey('7')">7</button>
        <button onclick="typeKey('8')">8</button>
        <button onclick="typeKey('9')">9</button>
        <button class="btn-action" onclick="deleteKey()">지우기</button>
        
        <button onclick="typeKey('0')" style="grid-column: span 2;">0</button>
        <button class="btn-submit" onclick="submitAnswer()" style="grid-column: span 2;">입력</button>
    </div>

    <div id="game-over">
        <h1>게임 종료!</h1>
        <h2>최종 점수: <span id="final-score">0</span> 점</h2>
        
        <h3 id="high-score-text">🏆 최고 기록: <span id="high-score">0</span> 점</h3>
        
        <div class="stats-box">
            <p>총 도전 횟수: <strong id="total-attempts" style="color:#00b894;">0</strong>회</p>
            <hr>
            <p style="font-size: 16px; color:#b2bec3;">[ 최근 5번의 기록 ]</p>
            <ul id="history-list">
            </ul>
        </div>

        <button class="start-btn" onclick="startGame()">다시 시작</button>
    </div>
</div>

<script>
    let score = 0;
    let lives = 5;
    let level = 1;
    let consecutiveCorrect = 0;
    let speed = 0.4;
    let animId;
    let spawnTimer;
    let lastTime;
    let currentInput = "";
    let problems = [];

    const playArea = document.getElementById('play-area');
    const inputDisplay = document.getElementById('input-display');
    const heartsDisplay = document.getElementById('hearts');
    const scoreDisplay = document.getElementById('score');
    const levelDisplay = document.getElementById('level-display');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreDisplay = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');

    // 💡 기록 초기화 함수 추가
    function resetRecords() {
        if (confirm("정말 모든 게임 기록을 초기화하시겠습니까?\n(이 작업은 되돌릴 수 없습니다.)")) {
            localStorage.removeItem('mathGameAttempts');
            localStorage.removeItem('mathGameHistory');
            localStorage.removeItem('mathGameHighScore');
            alert("기록이 성공적으로 초기화되었습니다!");
        }
    }

    function formatInputToLatex(str) {
        if (!str.includes('/')) return str; 
        let parts = str.split('/');
        let numStr = parts[0];
        let denStr = parts.length > 1 ? parts[1] : '';
        let sign = '';
        if (numStr.startsWith('-')) { sign = '-'; numStr = numStr.substring(1); }
        let latexNum = numStr === '' ? '\\phantom{0}' : numStr;
        let latexDen = denStr === '' ? '\\phantom{0}' : denStr;
        return `${sign}\\frac{${latexNum}}{${latexDen}}`;
    }

    function updateDisplay() {
        if (currentInput === "") {
            inputDisplay.innerHTML = '<span class="placeholder">정답 입력...</span>';
        } else {
            let latex = "\\displaystyle " + formatInputToLatex(currentInput);
            katex.render(latex, inputDisplay, { throwOnError: false });
        }
    }

    function typeKey(key) { currentInput += key; updateDisplay(); }
    function deleteKey() { currentInput = currentInput.slice(0, -1); updateDisplay(); }

    document.addEventListener('keydown', function(e) {
        if (startScreen.style.display !== 'none' || gameOverScreen.style.display === 'flex') return;
        if (e.key >= '0' && e.key <= '9' || e.key === '-' || e.key === '/') typeKey(e.key);
        else if (e.key === 'Backspace') deleteKey();
        else if (e.key === 'Enter') submitAnswer();
    });

    function getRandInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function formatTerm(num, den = 1, isFirst = false) {
        if (den < 0) { num = -num; den = -den; }
        if (den === 1) {
            if (num < 0 && !isFirst) return `\\left(${num}\\right)`;
            return `${num}`;
        }
        let sign = num < 0 ? '-' : '';
        let absNum = Math.abs(num);
        let frac = `${sign}\\frac{${absNum}}{${den}}`;
        if (num < 0 && !isFirst) return `\\left(${frac}\\right)`;
        return frac;
    }

    function createProblemData() {
        let text = ""; let val = 0; let scoreReward = 0;
        if (level === 1) { 
            let a = getRandInt(-9, 9); let b = getRandInt(-9, 9);
            let op = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, 1, true)} ${op} ${formatTerm(b, 1)}`;
            val = op === '+' ? a + b : a - b; scoreReward = 10;
        } else if (level === 2) { 
            let d = getRandInt(2, 7); let a = getRandInt(-9, 9); let b = getRandInt(-9, 9);
            let op = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, d, true)} ${op} ${formatTerm(b, d)}`;
            val = op === '+' ? (a + b)/d : (a - b)/d; scoreReward = 30;
        } else if (level === 3) { 
            let a = getRandInt(-9, 9); let b = getRandInt(-9, 9); let c = getRandInt(-9, 9);
            let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, 1, true)} ${op1} ${formatTerm(b, 1)} ${op2} ${formatTerm(c, 1)}`;
            let temp = op1 === '+' ? a + b : a - b; val = op2 === '+' ? temp + c : temp - c; scoreReward = 50;
        } else if (level === 4) { 
            let d = getRandInt(2, 7); let a = getRandInt(-9, 9); let b = getRandInt(-9, 9); let c = getRandInt(-9, 9);
            let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, d, true)} ${op1} ${formatTerm(b, d)} ${op2} ${formatTerm(c, d)}`;
            let temp = op1 === '+' ? a + b : a - b; val = op2 === '+' ? (temp + c)/d : (temp - c)/d; scoreReward = 70;
        } else { 
            let d1 = getRandInt(2, 5); let d2 = getRandInt(2, 5); let d3 = getRandInt(2, 5);
            let a = getRandInt(-5, 5); let b = getRandInt(-5, 5); let c = getRandInt(-5, 5);
            let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, d1, true)} ${op1} ${formatTerm(b, d2)} ${op2} ${formatTerm(c, d3)}`;
            let v1 = a/d1, v2 = b/d2, v3 = c/d3;
            let temp = op1 === '+' ? v1 + v2 : v1 - v2; val = op2 === '+' ? temp + v3 : temp - v3; scoreReward = 100;
        }
        return { text, val, scoreReward };
    }

    function spawnProblem() {
        if (lives <= 0) return;
        let data = createProblemData();
        let el = document.createElement('div');
        el.className = 'problem';
        playArea.appendChild(el);
        katex.render("\\displaystyle " + data.text, el, { throwOnError: false });

        let maxLeft = playArea.clientWidth - el.offsetWidth - 20;
        let leftPos = Math.max(10, getRandInt(10, maxLeft));
        el.style.left = leftPos + 'px';
        el.style.top = '-80px'; 
        problems.push({ el: el, val: data.val, scoreReward: data.scoreReward, y: -80 });
    }

    function parseAnswer(str) {
        if (!str) return null;
        if (str.includes('/')) {
            let parts = str.split('/');
            if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parts[0] !== "" && parts[1] !== "") {
                let num = parseFloat(parts[0]); let den = parseFloat(parts[1]);
                if (den === 0) return null; return num / den;
            }
        } else {
            if (!isNaN(str) && str !== '-' && str !== '') return parseFloat(str);
        }
        return null;
    }

    function update() {
        if (lives <= 0) return;
        let now = Date.now(); let dt = now - lastTime; let moveSpeed = speed * (dt / 16.66); lastTime = now;
        for (let i = problems.length - 1; i >= 0; i--) {
            let p = problems[i]; p.y += moveSpeed; p.el.style.top = p.y + 'px';
            if (p.y > playArea.clientHeight - 60) {
                p.el.remove(); problems.splice(i, 1); loseLife(); consecutiveCorrect = 0; 
            }
        }
        animId = requestAnimationFrame(update);
    }

    function loseLife() {
        lives--; updateUI();
        inputDisplay.classList.add('shake-screen');
        setTimeout(() => inputDisplay.classList.remove('shake-screen'), 300);
        if (lives <= 0) endGame();
    }

    function updateUI() {
        let h = ""; for (let i = 0; i < 5; i++) h += (i < lives) ? "❤️" : "🤍";
        heartsDisplay.innerText = h; scoreDisplay.innerText = `${score} 점`; levelDisplay.innerText = `Lv.${level}`;
    }

    function levelUpCheck() {
        consecutiveCorrect++;
        if (consecutiveCorrect >= 5) {
            consecutiveCorrect = 0;
            if (level < 5) { level++; speed += 0.1; }
        }
        updateUI();
    }

    function submitAnswer() {
        let userVal = parseAnswer(currentInput);
        if (userVal !== null) {
            let matchedIdx = -1; let maxY = -Infinity;
            for (let i = 0; i < problems.length; i++) {
                if (Math.abs(problems[i].val - userVal) < 0.0001) {
                    if (problems[i].y > maxY) { maxY = problems[i].y; matchedIdx = i; }
                }
            }
            if (matchedIdx !== -1) {
                let p = problems[matchedIdx]; score += p.scoreReward;
                p.el.remove(); problems.splice(matchedIdx, 1); levelUpCheck();
            } else {
                loseLife(); consecutiveCorrect = 0; 
            }
        }
        currentInput = ""; updateDisplay();
    }

    function startGame() {
        startScreen.style.display = 'none'; gameOverScreen.style.display = 'none';
        problems.forEach(p => p.el.remove()); problems = [];
        score = 0; lives = 5; level = 1; consecutiveCorrect = 0; speed = 0.4; currentInput = "";
        updateUI(); updateDisplay();
        if (spawnTimer) clearInterval(spawnTimer);
        spawnTimer = setInterval(spawnProblem, 4000);
        lastTime = Date.now(); cancelAnimationFrame(animId); update();
    }

    function endGame() {
        clearInterval(spawnTimer);
        cancelAnimationFrame(animId);
        finalScoreDisplay.innerText = score;

        // 기존 과거 기록 데이터 불러오기
        let totalAttempts = parseInt(localStorage.getItem('mathGameAttempts') || '0');
        let history = JSON.parse(localStorage.getItem('mathGameHistory') || '[]');

        // 기존 최고기록과 과거 기록(history)을 비교하여 '진짜 최고 기록' 보정
        let storedHighScore = parseInt(localStorage.getItem('mathGameHighScore') || '0');
        let maxInHistory = history.length > 0 ? Math.max(...history) : 0;
        let trueHighScore = Math.max(storedHighScore, maxInHistory);

        const highScoreTextEl = document.getElementById('high-score-text');

        // 보정된 진짜 최고 기록보다 이번 점수가 높을 때만 신기록으로 인정
        if (score > trueHighScore) {
            trueHighScore = score;
            
            // 신기록 연출
            highScoreTextEl.innerHTML = `🎉 신기록 달성!: <span id="high-score">${trueHighScore}</span> 점 🎉`;
            highScoreTextEl.classList.add('new-record');
        } else {
            // 일반 최고 기록 표시
            highScoreTextEl.innerHTML = `🏆 최고 기록: <span id="high-score">${trueHighScore}</span> 점`;
            highScoreTextEl.classList.remove('new-record');
        }

        // 보정된 최고 기록 저장
        localStorage.setItem('mathGameHighScore', trueHighScore);

        // 이번 판 기록을 history에 추가
        totalAttempts++;
        history.push(score);

        // 업데이트 된 정보 저장
        localStorage.setItem('mathGameAttempts', totalAttempts);
        localStorage.setItem('mathGameHistory', JSON.stringify(history));

        // 화면에 통계 정보 띄우기
        document.getElementById('total-attempts').innerText = totalAttempts;
        let historyList = document.getElementById('history-list');
        historyList.innerHTML = '';
        
        let recentHistory = history.slice(-5);
        recentHistory.reverse().forEach((s, index) => {
            let li = document.createElement('li');
            let attemptNum = totalAttempts - index;
            li.innerText = `${attemptNum}회차: ${s} 점`;
            historyList.appendChild(li);
        });

        gameOverScreen.style.display = 'flex';
    }
</script>

</body>
</html>
