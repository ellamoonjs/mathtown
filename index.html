<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정수와 유리수 계산 게임</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // ⚠️ 여기에 본인의 firebaseConfig 코드를 다시 덮어쓰세요!
  const firebaseConfig ={
  apiKey:"process.env.SECRET",
  authDomain:"math-pm-game.firebaseapp.com",
  projectId:"math-pm-game",
  storageBucket:"math-pm-game.firebasestorage.app",
  messagingSenderId:"669037026022",
  appId:"1:669037026022:web:1ed055f51052241ce07927",
  measurementId:"G-8X6LYEZFYY"
};

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.db = db;
      window.firebaseActions = { collection, addDoc, query, orderBy, limit, getDocs };
    </script>

    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; background-color: #e9ecef; font-family: 'Malgun Gothic', sans-serif; user-select: none; touch-action: manipulation; }
        #game-container { width: 100%; max-width: 600px; height: 100%; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #ui-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #2d3436; color: white; font-size: 20px; font-weight: bold; z-index: 2; position: relative; }
        #hearts { color: #ff7675; letter-spacing: 2px; }
        #level-display { color: #74b9ff; }
        #play-area { flex-grow: 1; position: relative; background: #fdfbfb; overflow: hidden; }
        #combo-display { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #ff9f43; font-size: 32px; font-weight: 900; opacity: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); white-space: nowrap; pointer-events: none; z-index: 5; }
        @keyframes combo-pop-fade { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 10% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; } 90% { transform: translate(-50%, -50%) scale(1.0); opacity: 0.5; } 100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; } }
        .combo-anim-fade { animation: combo-pop-fade 1.0s forwards; }
        .problem { position: absolute; font-size: 24px; background: white; border: 2px solid #0984e3; padding: 8px 15px; border-radius: 8px; color: #2d3436; box-shadow: 0 4px 6px rgba(0,0,0,0.1); white-space: nowrap; display: flex; justify-content: center; align-items: center; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        .shake-screen { animation: shake 0.3s ease-in-out; background-color: #ffeaa7 !important; }
        #input-display { height: 80px; display: flex; justify-content: center; align-items: center; padding: 0 20px; background: #f1f2f6; font-size: 32px; color: #0984e3; border-top: 2px solid #dfe6e9; z-index: 2; transition: background-color 0.2s; overflow-x: auto; }
        .placeholder { color: #b2bec3; font-size: 20px; font-weight: normal; font-family: 'Malgun Gothic', sans-serif; }
        #keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; background: #dfe6e9; z-index: 2; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        #keypad button { padding: 15px 0; font-size: 24px; font-weight: bold; border: none; border-radius: 8px; background: white; color: #2d3436; box-shadow: 0 3px 0 #b2bec3; cursor: pointer; transition: background 0.1s; }
        #keypad button:active { transform: translateY(3px); box-shadow: none; background: #f1f2f6; }
        .btn-action { background: #ffeaa7 !important; }
        .btn-submit { background: #0984e3 !important; color: white !important; box-shadow: 0 3px 0 #0652dd !important; }
        #game-over, #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #start-screen { background: white; z-index: 20; }
        #game-over { background: rgba(45, 52, 54, 0.95); color: white; display: none; overflow-y: auto; padding: 20px 0; }
        #start-screen h1 { margin-bottom: 10px; color: #2d3436; font-size: 32px; }
        #start-screen p { color: #636e72; margin-bottom: 15px; text-align: center; line-height: 1.6; padding: 0 20px; }
        #game-over h1 { font-size: 45px; margin-bottom: 5px; color: #ff7675; }
        #game-over h2 { font-size: 24px; margin-bottom: 10px; color: #74b9ff; }
        #reset-btn { position: absolute; top: 20px; left: 20px; padding: 6px 12px; font-size: 14px; background: #dfe6e9; color: #636e72; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #excel-btn { position: absolute; top: 20px; left: 110px; padding: 6px 12px; font-size: 14px; background: #00b894; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #high-score-text { font-size: 20px; color: #fdcb6e; margin-top: -5px; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .new-record { animation: bounce 0.4s ease infinite alternate; color: #ffea00 !important; }
        .stats-box { background: rgba(255, 255, 255, 0.1); padding: 15px 25px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.2); width: 80%; max-width: 300px;}
        .stats-box p { margin: 0 0 10px 0; font-size: 18px; color: #f1f2f6; }
        #history-list { list-style: none; padding: 0; margin: 0; color: #ffeaa7; font-size: 16px; line-height: 1.5; }
        button.start-btn { padding: 12px 30px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; width: 220px; }
        .btn-easy { background: #00b894; box-shadow: 0 4px 0 #008f73; }
        .btn-normal { background: #0984e3; box-shadow: 0 4px 0 #0652dd; }
        .btn-rank { background: #6c5ce7; box-shadow: 0 4px 0 #4834d4; font-size: 14px !important; width: 120px !important; margin-bottom: 15px; }
        .nickname-input { padding: 12px; font-size: 18px; border-radius: 8px; border: 2px solid #0984e3; width: 220px; text-align: center; outline: none; margin-bottom: 10px; font-weight: bold; }
        #ranking-area { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 8px; width: 80%; max-width: 300px; margin-bottom: 15px; display: none; }
        .rank-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; font-size: 16px; }
        #recommend-msg { color: #ffea00; font-weight: bold; margin-bottom: 15px; text-align: center; font-size: 18px; animation: bounce 0.5s infinite alternate; display: none;}
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <button id="reset-btn" onclick="resetRecords()">기록 초기화</button>
        <button id="excel-btn" onclick="downloadExcel()">결과 엑셀로 받기</button>
        <h1>정수와 유리수 계산</h1>
        <p>학번과 이름을 입력하고 난이도를 선택하세요!</p>
        <input type="text" id="nickname-input" class="nickname-input" placeholder="학번과 이름 입력" maxlength="8">
        <button class="start-btn btn-easy" onclick="selectMode('easy')">쉬운 버전 (정수)</button>
        <button class="start-btn btn-normal" onclick="selectMode('normal')">보통 버전 (유리수)</button>
    </div>

    <div id="ui-bar">
        <div id="hearts">❤️❤️❤️❤️❤️</div>
        <div id="level-display">Lv.1</div>
        <div id="score">0 점</div>
    </div>
    
    <div id="play-area"><div id="combo-display"></div></div>
    <div id="input-display"><span class="placeholder">정답 입력...</span></div>
    
    <div id="keypad">
        <button onclick="typeKey('1')">1</button><button onclick="typeKey('2')">2</button><button onclick="typeKey('3')">3</button><button class="btn-action" onclick="typeKey('-')">-</button>
        <button onclick="typeKey('4')">4</button><button onclick="typeKey('5')">5</button><button onclick="typeKey('6')">6</button><button class="btn-action" onclick="typeKey('/')">/</button>
        <button onclick="typeKey('7')">7</button><button onclick="typeKey('8')">8</button><button onclick="typeKey('9')">9</button><button class="btn-action" onclick="deleteKey()">지움</button>
        <button onclick="typeKey('0')" style="grid-column: span 2;">0</button><button class="btn-submit" onclick="submitAnswer()" style="grid-column: span 2;">입력</button>
    </div>

    <div id="game-over">
        <h1>게임 종료!</h1>
        <div id="recommend-msg">✨ 대단해요! 이제 보통 버전에 도전해볼까요? ✨</div>
        <h2>최종 점수: <span id="final-score">0</span> 점</h2>
        <h3 id="high-score-text">🏆 내 최고 기록: <span id="high-score">0</span> 점</h3>
        
        <button class="start-btn btn-rank" id="show-rank-btn" onclick="loadRanking()">전체 랭킹 보기</button>

        <div id="ranking-area">
            <p id="rank-title" style="margin: 0 0 10px 0; color: #74b9ff; font-weight: bold;">🌍 명예의 전당</p>
            <div id="rank-list-content">데이터 로딩 중...</div>
        </div>

        <div class="stats-box">
            <p style="font-size: 14px; color:#b2bec3;">[ 나의 최근 5회 기록 ]</p>
            <ul id="history-list"></ul>
        </div>
        <button class="start-btn btn-normal" onclick="goHome()" style="width: 150px; font-size: 16px;">처음으로</button>
    </div>
</div>

<script>
    let score = 0; let lives = 5; let level = 1; let consecutiveCorrect = 0; let speed = 0.4;
    let combo = 0; let animId; let spawnTimer; let lastTime; let currentInput = ""; let problems = [];
    let playerNickname = ""; let gameMode = "normal";

    const playArea = document.getElementById('play-area');
    const inputDisplay = document.getElementById('input-display');
    const heartsDisplay = document.getElementById('hearts');
    const scoreDisplay = document.getElementById('score');
    const levelDisplay = document.getElementById('level-display');
    const comboDisplay = playArea.querySelector('#combo-display'); 
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreDisplay = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');

    function selectMode(mode) {
        const name = document.getElementById('nickname-input').value.trim();
        if (!name) { alert("학번과 이름을 입력해주세요!"); return; }
        playerNickname = name; 
        sessionStorage.setItem('mathGameName', name); 
        gameMode = mode; 
        startGame();
    }

    function goHome() {
        gameOverScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        document.getElementById('ranking-area').style.display = 'none';
        document.getElementById('show-rank-btn').style.display = 'block';
    }

    function resetRecords() { 
        if (confirm("나의 기기 기록을 초기화하시겠습니까?")) { 
            localStorage.clear(); 
            alert("초기화되었습니다."); 
        } 
    }

    async function downloadExcel() {
        const pw = prompt("비밀번호 입력:"); if (pw !== "1029") { alert("틀렸습니다."); return; }
        try {
            const modeToDown = confirm("확인: 쉬운 버전 / 취소: 보통 버전") ? "easy" : "normal";
            const q = window.firebaseActions.query(window.firebaseActions.collection(window.db, "rankings_" + modeToDown), window.firebaseActions.orderBy("timestamp", "desc"));
            const snap = await window.firebaseActions.getDocs(q);
            let csv = "\uFEFF날짜,이름,점수\n";
            snap.forEach(doc => { const d = doc.data(); csv += `"${d.timestamp.toDate().toLocaleString()}","${d.name}",${d.score}\n`; });
            const blob = new Blob([csv], {type:'text/csv'}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `수학게임_${modeToDown}_결과.csv`; a.click();
        } catch(e) { alert("오류 발생"); }
    }

    // 💡 loadRanking()을 호출하지 않음 (읽기 횟수 절약)
    async function autoUploadScore() {
        if (!window.firebaseActions) return;
        try { 
            await window.firebaseActions.addDoc(window.firebaseActions.collection(window.db, "rankings_" + gameMode), { 
                name: playerNickname, 
                score: score, 
                timestamp: new Date() 
            }); 
        } catch (e) { console.error(e); }
    }

    // 💡 사용자가 버튼을 눌렀을 때만 실행됨
    async function loadRanking() {
        const listContent = document.getElementById('rank-list-content');
        const rankingArea = document.getElementById('ranking-area');
        const rankBtn = document.getElementById('show-rank-btn');

        rankingArea.style.display = 'block';
        rankBtn.style.display = 'none'; // 버튼 숨기기
        
        document.getElementById('rank-title').innerText = `🌍 명예의 전당 (${gameMode === 'easy' ? '쉬운 버전' : '보통 버전'})`;
        try {
            const q = window.firebaseActions.query(window.firebaseActions.collection(window.db, "rankings_" + gameMode), window.firebaseActions.orderBy("score", "desc"), window.firebaseActions.limit(10));
            const snap = await window.firebaseActions.getDocs(q);
            let html = ""; let rank = 1;
            snap.forEach(doc => { const d = doc.data(); html += `<div class="rank-item"><span>${rank}. ${d.name}</span><span style="color:#ffeaa7; font-weight:bold;">${d.score} 점</span></div>`; rank++; });
            listContent.innerHTML = html || "기록이 없습니다.";
        } catch (e) { listContent.innerHTML = "불러오기 실패"; }
    }

    function formatInputToLatex(str) {
        if (!str.includes('/')) return str; 
        let parts = str.split('/');
        let numStr = parts[0]; let denStr = parts.length > 1 ? parts[1] : ''; let sign = '';
        if (numStr.startsWith('-')) { sign = '-'; numStr = numStr.substring(1); }
        let latexNum = numStr === '' ? '\\phantom{0}' : numStr; let latexDen = denStr === '' ? '\\phantom{0}' : denStr;
        return `${sign}\\frac{${latexNum}}{${latexDen}}`;
    }

    function createProblemData() {
        let text = ""; let val = 0; let scoreReward = 0; let speedMult = 1.0;
        if (gameMode === 'easy') {
            if (level <= 2) {
                let a = getRandInt(-15, 15); let b = getRandInt(-15, 15); let op = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, 1, true)} ${op} ${formatTerm(b, 1)}`; val = op === '+' ? a + b : a - b; scoreReward = 10;
            } else {
                let a = getRandInt(-10, 10); let b = getRandInt(-10, 10); let c = getRandInt(-10, 10);
                let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, 1, true)} ${op1} ${formatTerm(b, 1)} ${op2} ${formatTerm(c, 1)}`;
                let tmp = op1 === '+' ? a + b : a - b; val = op2 === '+' ? tmp + c : tmp - c; scoreReward = 20;
            }
            speedMult = 1.0 + (level * 0.1); 
        } else {
            if (level === 1) { 
                let a = getRandInt(-9, 9); let b = getRandInt(-9, 9); let op = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, 1, true)} ${op} ${formatTerm(b, 1)}`; val = op === '+' ? a + b : a - b; scoreReward = 10;
            } else if (level === 2) { 
                let d = getRandInt(2, 7); let a = getRandInt(-9, 9); let b = getRandInt(-9, 9); let op = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, d, true)} ${op} ${formatTerm(b, d)}`; val = op === '+' ? (a+b)/d : (a-b)/d; scoreReward = 30; speedMult = 0.65;
            } else if (level === 3) {
                let a = getRandInt(-9, 9); let b = getRandInt(-9, 9); let c = getRandInt(-9, 9);
                let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, 1, true)} ${op1} ${formatTerm(b, 1)} ${op2} ${formatTerm(c, 1)}`;
                let tmp = op1 === '+' ? a + b : a - b; val = op2 === '+' ? tmp + c : tmp - c; scoreReward = 50; speedMult = 0.85;
            } else if (level === 4) {
                let d = getRandInt(2, 7); let a = getRandInt(-9, 9); let b = getRandInt(-9, 9); let c = getRandInt(-9, 9);
                let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, d, true)} ${op1} ${formatTerm(b, d)} ${op2} ${formatTerm(c, d)}`;
                let tmp = op1 === '+' ? a + b : a - b; val = op2 === '+' ? (tmp+c)/d : (tmp-c)/d; scoreReward = 70; speedMult = 0.55;
            } else {
                let d1 = getRandInt(2, 5); let d2 = getRandInt(2, 5); let d3 = getRandInt(2, 5);
                let a = getRandInt(-5, 5); let b = getRandInt(-5, 5); let c = getRandInt(-5, 5);
                let op1 = getRandInt(0, 1) ? '+' : '-'; let op2 = getRandInt(0, 1) ? '+' : '-';
                text = `${formatTerm(a, d1, true)} ${op1} ${formatTerm(b, d2)} ${op2} ${formatTerm(c, d3)}`;
                let v1 = a/d1, v2 = b/d2, v3 = c/d3; let tmp = op1 === '+' ? v1 + v2 : v1 - v2; val = op2 === '+' ? tmp + v3 : tmp - v3; scoreReward = 100; speedMult = 0.45;
            }
        }
        return { text, val, scoreReward, speedMult };
    }

    function formatTerm(num, den = 1, isFirst = false) {
        if (den < 0) { num = -num; den = -den; }
        if (den === 1) { if (num < 0 && !isFirst) return `\\left(${num}\\right)`; return `${num}`; }
        let s = num < 0 ? '-' : ''; let an = Math.abs(num); let f = `${s}\\frac{${an}}{${den}}`;
        if (num < 0 && !isFirst) return `\\left(${f}\\right)`; return f;
    }

    function spawnProblem() {
        if (lives <= 0) return;
        if (problems.length >= 3) return;
        let data = createProblemData();
        let el = document.createElement('div'); el.className = 'problem'; 
        el.style.visibility = 'hidden'; playArea.appendChild(el);
        katex.render("\\displaystyle " + data.text, el, { throwOnError: false });
        const nw = el.offsetWidth; el.style.visibility = 'visible'; 
        let pl = 0; let safe = false; let att = 0;
        while (!safe && att < 20) { att++; pl = getRandInt(10, Math.max(10, playArea.clientWidth - nw - 10)); safe = true; for (let p of problems) { if (pl < p.el.offsetLeft + p.width && pl + nw > p.el.offsetLeft) { safe = false; break; } } }
        el.style.left = pl + 'px'; el.style.top = '-80px'; 
        problems.push({ el: el, val: data.val, scoreReward: data.scoreReward, y: -80, speedMult: data.speedMult, width: nw });
    }

    function parseAnswer(str) {
        if (!str) return null;
        if (str.includes('/')) {
            let p = str.split('/'); if (p.length === 2 && !isNaN(p[0]) && !isNaN(p[1]) && p[0] !== "" && p[1] !== "") {
                let n = parseFloat(p[0]); let d = parseFloat(p[1]); return d === 0 ? null : n / d;
            }
        } else { if (!isNaN(str) && str !== '-' && str !== '') return parseFloat(str); }
        return null;
    }

    function update() {
        if (lives <= 0) return;
        let now = Date.now(); let dt = now - lastTime; let bms = speed * (dt / 16.66); lastTime = now;
        for (let i = problems.length - 1; i >= 0; i--) {
            let p = problems[i]; p.y += bms * p.speedMult; p.el.style.top = p.y + 'px';
            if (p.y > playArea.clientHeight - 60) { p.el.remove(); problems.splice(i, 1); combo = 0; updateComboDisplay(0); loseLife(); consecutiveCorrect = 0; }
        }
        animId = requestAnimationFrame(update);
    }

    function loseLife() { lives--; updateUI(); inputDisplay.classList.add('shake-screen'); setTimeout(() => inputDisplay.classList.remove('shake-screen'), 300); if (lives <= 0) endGame(); }
    function updateUI() { let h = ""; for (let i = 0; i < 5; i++) h += (i < lives) ? "❤️" : "🤍"; heartsDisplay.innerText = h; scoreDisplay.innerText = `${score} 점`; levelDisplay.innerText = `Lv.${level}`; }
    function levelUpCheck() { consecutiveCorrect++; if (consecutiveCorrect >= 5) { consecutiveCorrect = 0; if (level < 5) { level++; speed += 0.1; } } updateUI(); }

    function submitAnswer() {
        let uv = parseAnswer(currentInput);
        if (uv !== null) {
            let midx = -1; let my = -Infinity;
            for (let i = 0; i < problems.length; i++) { if (Math.abs(problems[i].val - uv) < 0.0001) { if (problems[i].y > my) { my = problems[i].y; midx = i; } } }
            if (midx !== -1) {
                let p = problems[midx]; combo++; let cb = (combo > 1) ? (combo - 1) * 5 : 0; score += p.scoreReward + cb;
                p.el.remove(); problems.splice(midx, 1); levelUpCheck(); updateComboDisplay(cb);
            } else { combo = 0; updateComboDisplay(0); loseLife(); consecutiveCorrect = 0; }
        }
        currentInput = ""; updateDisplay();
    }

    function startGame() {
        startScreen.style.display = 'none'; gameOverScreen.style.display = 'none';
        problems.forEach(p => p.el.remove()); problems = [];
        score = 0; lives = 5; level = 1; consecutiveCorrect = 0; speed = 0.4; currentInput = ""; combo = 0;
        updateUI(); updateDisplay(); updateComboDisplay(0);
        if (spawnTimer) clearInterval(spawnTimer); spawnTimer = setInterval(spawnProblem, 4000);
        lastTime = Date.now(); cancelAnimationFrame(animId); update();
    }

    function endGame() {
        clearInterval(spawnTimer); cancelAnimationFrame(animId);
        finalScoreDisplay.innerText = score;
        const msgEl = document.getElementById('recommend-msg');
        if (gameMode === 'easy' && score >= 1000) msgEl.style.display = 'block'; else msgEl.style.display = 'none';
        
        let hKey = 'mathHigh_' + gameMode; let h = parseInt(localStorage.getItem(hKey) || '0');
        if (score > h) { h = score; localStorage.setItem(hKey, h); document.getElementById('high-score-text').classList.add('new-record'); }
        else document.getElementById('high-score-text').classList.remove('new-record');
        document.getElementById('high-score').innerText = h;
        
        let globalHist = JSON.parse(localStorage.getItem('mathGameGlobalHist') || '[]');
        let modeName = gameMode === 'easy' ? '쉬운버전' : '보통버전';
        globalHist.push({ mode: modeName, score: score });
        localStorage.setItem('mathGameGlobalHist', JSON.stringify(globalHist));

        let hl = document.getElementById('history-list'); hl.innerHTML = '';
        globalHist.slice(-5).reverse().forEach(item => { 
            let li = document.createElement('li'); 
            if (typeof item === 'number') { li.innerText = `[이전기록] ${item} 점`; } 
            else { let color = item.mode === '쉬운버전' ? '#00b894' : '#74b9ff'; li.innerHTML = `<strong style="color:${color};">[${item.mode}]</strong> ${item.score} 점`; }
            hl.appendChild(li); 
        });

        gameOverScreen.style.display = 'flex'; 
        autoUploadScore(); // 점수 저장은 하지만, 랭킹을 불러오지는 않음
    }

    function updateComboDisplay(b) { if (combo > 1) { comboDisplay.innerText = `${combo} COMBO! (+${b})`; comboDisplay.classList.remove('combo-anim-fade'); void comboDisplay.offsetWidth; comboDisplay.classList.add('combo-anim-fade'); } }
    function typeKey(k) { currentInput += k; updateDisplay(); }
    function deleteKey() { currentInput = currentInput.slice(0, -1); updateDisplay(); }
    function updateDisplay() { 
        if (currentInput === "") { inputDisplay.innerHTML = '<span class="placeholder">정답 입력...</span>'; } 
        else { let latex = "\\displaystyle " + formatInputToLatex(currentInput); katex.render(latex, inputDisplay, { throwOnError: false }); } 
    }
    function getRandInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    const savedName = sessionStorage.getItem('mathGameName');
    if (savedName) { document.getElementById('nickname-input').value = savedName; }
</script>
</body>
</html>
