<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정수와 유리수 계산 게임</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            background-color: #e9ecef;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            user-select: none;
            touch-action: manipulation;
        }
        #game-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #ui-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #2d3436;
            color: white;
            font-size: 20px;
            font-weight: bold;
            z-index: 2;
        }
        #hearts { color: #ff7675; letter-spacing: 2px; }
        #level-display { color: #74b9ff; }
        #play-area {
            flex-grow: 1;
            position: relative;
            background: #fdfbfb;
            overflow: hidden;
        }
        .problem {
            position: absolute;
            font-size: 22px;
            font-weight: bold;
            background: white;
            border: 2px solid #0984e3;
            padding: 10px 15px;
            border-radius: 8px;
            color: #2d3436;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            white-space: nowrap;
        }
        /* 오답일 때 화면이 흔들리는 효과 (옵션) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .shake-screen {
            animation: shake 0.3s ease-in-out;
            background-color: #ffeaa7 !important;
        }
        
        #input-display {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: #f1f2f6;
            font-size: 28px;
            font-weight: bold;
            color: #2d3436;
            border-top: 2px solid #dfe6e9;
            z-index: 2;
            transition: background-color 0.2s;
        }
        .placeholder { color: #b2bec3; font-size: 20px; font-weight: normal; }
        
        #keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            background: #dfe6e9;
            z-index: 2;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        #keypad button {
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: white;
            color: #2d3436;
            box-shadow: 0 3px 0 #b2bec3;
            cursor: pointer;
            transition: background 0.1s;
        }
        #keypad button:active {
            transform: translateY(3px);
            box-shadow: none;
            background: #f1f2f6;
        }
        .btn-action { background: #ffeaa7 !important; }
        .btn-submit { background: #0984e3 !important; color: white !important; box-shadow: 0 3px 0 #0652dd !important; }
        
        #game-over, #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #start-screen { background: white; z-index: 20; }
        #game-over { background: rgba(45, 52, 54, 0.95); color: white; display: none; }
        #start-screen h1 { margin-bottom: 10px; color: #2d3436; font-size: 32px; }
        #start-screen p { color: #636e72; margin-bottom: 30px; text-align: center; line-height: 1.6; padding: 0 20px; }
        #game-over h1 { font-size: 45px; margin-bottom: 10px; color: #ff7675; }
        #game-over h2 { font-size: 30px; margin-bottom: 30px; }
        button.start-btn {
            padding: 15px 40px; font-size: 24px; font-weight: bold; background: #00b894;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #008f73;
        }
        button.start-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>정수와 유리수 계산</h1>
        <p>내려오는 수식의 정답을 키패드로 입력하세요.<br>분수는 <strong>1/2</strong>, <strong>-3/4</strong> 형태로 입력합니다.<br>PC의 키보드로도 입력 가능합니다!</p>
        <button class="start-btn" onclick="startGame()">게임 시작</button>
    </div>

    <div id="ui-bar">
        <div id="hearts">❤️❤️❤️❤️❤️</div>
        <div id="level-display">Lv.1</div>
        <div id="score">0 점</div>
    </div>
    
    <div id="play-area"></div>
    
    <div id="input-display"><span class="placeholder">정답 입력...</span></div>
    
    <div id="keypad">
        <button onclick="typeKey('1')">1</button>
        <button onclick="typeKey('2')">2</button>
        <button onclick="typeKey('3')">3</button>
        <button class="btn-action" onclick="typeKey('-')">-</button>
        
        <button onclick="typeKey('4')">4</button>
        <button onclick="typeKey('5')">5</button>
        <button onclick="typeKey('6')">6</button>
        <button class="btn-action" onclick="typeKey('/')">/</button>
        
        <button onclick="typeKey('7')">7</button>
        <button onclick="typeKey('8')">8</button>
        <button onclick="typeKey('9')">9</button>
        <button class="btn-action" onclick="deleteKey()">지우기</button>
        
        <button onclick="typeKey('0')" style="grid-column: span 2;">0</button>
        <button class="btn-submit" onclick="submitAnswer()" style="grid-column: span 2;">입력</button>
    </div>

    <div id="game-over">
        <h1>게임 종료!</h1>
        <h2>최종 점수: <span id="final-score">0</span> 점</h2>
        <button class="start-btn" onclick="startGame()">다시 시작</button>
    </div>
</div>

<script>
    let score = 0;
    let lives = 5;
    let level = 1;
    let consecutiveCorrect = 0;
    let speed = 0.4;
    let animId;
    let spawnTimer;
    let lastTime;
    let currentInput = "";

    const playArea = document.getElementById('play-area');
    const inputDisplay = document.getElementById('input-display');
    const heartsDisplay = document.getElementById('hearts');
    const scoreDisplay = document.getElementById('score');
    const levelDisplay = document.getElementById('level-display');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreDisplay = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');

    // 키패드 입력 처리
    function typeKey(key) {
        currentInput += key;
        updateDisplay();
    }

    function deleteKey() {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }

    function updateDisplay() {
        if (currentInput === "") {
            inputDisplay.innerHTML = '<span class="placeholder">정답 입력...</span>';
        } else {
            inputDisplay.innerText = currentInput;
        }
    }

    // PC 키보드 지원
    document.addEventListener('keydown', function(e) {
        if (startScreen.style.display !== 'none' || gameOverScreen.style.display === 'flex') return;
        
        if (e.key >= '0' && e.key <= '9' || e.key === '-' || e.key === '/') {
            typeKey(e.key);
        } else if (e.key === 'Backspace') {
            deleteKey();
        } else if (e.key === 'Enter') {
            submitAnswer();
        }
    });

    function getRandInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatTerm(num, den = 1, isFirst = false) {
        if (den < 0) { num = -num; den = -den; }
        if (den === 1) {
            if (num < 0 && !isFirst) return `(${num})`;
            return `${num}`;
        }
        let str = `${num}/${den}`;
        if (num < 0 && !isFirst) return `(${str})`;
        return str;
    }

    function createProblemData() {
        let text = "";
        let val = 0;
        let scoreReward = 0;

        if (level === 1) { 
            let a = getRandInt(-9, 9);
            let b = getRandInt(-9, 9);
            let op = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, 1, true)} ${op} ${formatTerm(b, 1)}`;
            val = op === '+' ? a + b : a - b;
            scoreReward = 10;
        } else if (level === 2) { 
            let d = getRandInt(2, 7);
            let a = getRandInt(-9, 9);
            let b = getRandInt(-9, 9);
            let op = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, d, true)} ${op} ${formatTerm(b, d)}`;
            val = op === '+' ? (a + b)/d : (a - b)/d;
            scoreReward = 30;
        } else if (level === 3) { 
            let a = getRandInt(-9, 9);
            let b = getRandInt(-9, 9);
            let c = getRandInt(-9, 9);
            let op1 = getRandInt(0, 1) ? '+' : '-';
            let op2 = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, 1, true)} ${op1} ${formatTerm(b, 1)} ${op2} ${formatTerm(c, 1)}`;
            let temp = op1 === '+' ? a + b : a - b;
            val = op2 === '+' ? temp + c : temp - c;
            scoreReward = 50;
        } else if (level === 4) { 
            let d = getRandInt(2, 7);
            let a = getRandInt(-9, 9);
            let b = getRandInt(-9, 9);
            let c = getRandInt(-9, 9);
            let op1 = getRandInt(0, 1) ? '+' : '-';
            let op2 = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, d, true)} ${op1} ${formatTerm(b, d)} ${op2} ${formatTerm(c, d)}`;
            let temp = op1 === '+' ? a + b : a - b;
            val = op2 === '+' ? (temp + c)/d : (temp - c)/d;
            scoreReward = 70;
        } else { 
            let d1 = getRandInt(2, 5);
            let d2 = getRandInt(2, 5);
            let d3 = getRandInt(2, 5);
            let a = getRandInt(-5, 5);
            let b = getRandInt(-5, 5);
            let c = getRandInt(-5, 5);
            let op1 = getRandInt(0, 1) ? '+' : '-';
            let op2 = getRandInt(0, 1) ? '+' : '-';
            text = `${formatTerm(a, d1, true)} ${op1} ${formatTerm(b, d2)} ${op2} ${formatTerm(c, d3)}`;
            let v1 = a/d1, v2 = b/d2, v3 = c/d3;
            let temp = op1 === '+' ? v1 + v2 : v1 - v2;
            val = op2 === '+' ? temp + v3 : temp - v3;
            scoreReward = 100;
        }
        return { text, val, scoreReward };
    }

    let problems = [];

    function spawnProblem() {
        if (lives <= 0) return;

        let data = createProblemData();
        let el = document.createElement('div');
        el.className = 'problem';
        el.innerText = data.text;
        playArea.appendChild(el);

        let maxLeft = playArea.clientWidth - el.offsetWidth - 20;
        let leftPos = Math.max(10, getRandInt(10, maxLeft));
        el.style.left = leftPos + 'px';
        el.style.top = '-50px';

        problems.push({ el: el, val: data.val, scoreReward: data.scoreReward, y: -50 });
    }

    function parseAnswer(str) {
        if (!str) return null;
        if (str.includes('/')) {
            let parts = str.split('/');
            if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parts[0] !== "" && parts[1] !== "") {
                let num = parseFloat(parts[0]);
                let den = parseFloat(parts[1]);
                if (den === 0) return null;
                return num / den;
            }
        } else {
            if (!isNaN(str) && str !== '-' && str !== '') {
                return parseFloat(str);
            }
        }
        return null;
    }

    function update() {
        if (lives <= 0) return;

        let now = Date.now();
        let dt = now - lastTime;
        let moveSpeed = speed * (dt / 16.66); 
        lastTime = now;

        for (let i = problems.length - 1; i >= 0; i--) {
            let p = problems[i];
            p.y += moveSpeed;
            p.el.style.top = p.y + 'px';

            // 문제가 바닥에 닿았을 때 오답 처리 (하트 감소)
            if (p.y > playArea.clientHeight - 40) {
                p.el.remove();
                problems.splice(i, 1);
                loseLife();
                consecutiveCorrect = 0; 
            }
        }
        animId = requestAnimationFrame(update);
    }

    function loseLife() {
        lives--;
        updateUI();
        
        // 오답 시 입력창이 붉어지며 흔들리는 시각적 효과 추가
        inputDisplay.classList.add('shake-screen');
        setTimeout(() => inputDisplay.classList.remove('shake-screen'), 300);

        if (lives <= 0) endGame();
    }

    function updateUI() {
        let h = "";
        for (let i = 0; i < 5; i++) {
            h += (i < lives) ? "❤️" : "🤍"; // 줄어든 하트는 하얀색 하트로 변경
        }
        heartsDisplay.innerText = h;
        scoreDisplay.innerText = `${score} 점`;
        levelDisplay.innerText = `Lv.${level}`;
    }

    function levelUpCheck() {
        consecutiveCorrect++;
        if (consecutiveCorrect >= 5) {
            consecutiveCorrect = 0;
            if (level < 5) {
                level++;
                speed += 0.1;
            }
        }
        updateUI();
    }

    function submitAnswer() {
        let userVal = parseAnswer(currentInput);
        if (userVal !== null) {
            let matchedIdx = -1;
            let maxY = -Infinity;

            // 정답 검사
            for (let i = 0; i < problems.length; i++) {
                if (Math.abs(problems[i].val - userVal) < 0.0001) {
                    if (problems[i].y > maxY) {
                        maxY = problems[i].y;
                        matchedIdx = i;
                    }
                }
            }

            if (matchedIdx !== -1) {
                // 정답을 맞췄을 때
                let p = problems[matchedIdx];
                score += p.scoreReward;
                p.el.remove();
                problems.splice(matchedIdx, 1);
                levelUpCheck();
            } else {
                // ⭐️ 정답을 틀렸을 때 (추가된 부분)
                loseLife(); 
                consecutiveCorrect = 0; // 연속 정답 초기화
            }
        }
        currentInput = "";
        updateDisplay();
    }

    function startGame() {
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        
        problems.forEach(p => p.el.remove());
        problems = [];
        
        score = 0;
        lives = 5;
        level = 1;
        consecutiveCorrect = 0;
        speed = 0.4;
        currentInput = "";
        
        updateUI();
        updateDisplay();

        if (spawnTimer) clearInterval(spawnTimer);
        spawnTimer = setInterval(spawnProblem, 4000);

        lastTime = Date.now();
        cancelAnimationFrame(animId);
        update();
    }

    function endGame() {
        clearInterval(spawnTimer);
        cancelAnimationFrame(animId);
        finalScoreDisplay.innerText = score;
        gameOverScreen.style.display = 'flex';
    }
</script>

</body>
</html>
